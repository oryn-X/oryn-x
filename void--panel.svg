
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Animated low-level terminal panel</title>
  <desc id="desc">Transparent low-level terminal panel for GitHub dark theme.</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>

    <clipPath id="panelClip">
      <rect x="12" y="54" width="936" height="532" rx="26"/>
    </clipPath>

    <linearGradient id="lineFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7AA2F7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7AA2F7" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#7AA2F7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g transform="translate(0,-30)">
    <g filter="url(#shadow)">
      <rect x="12" y="54" width="936" height="532" rx="26" fill="none" stroke="#2b3745" stroke-width="1.3"/>
      <rect x="12" y="54" width="936" height="56" rx="26" fill="none" stroke="#222d3a" stroke-width="1"/>
    </g>

    <circle cx="44" cy="82" r="6" fill="#FF5F56"/>
    <circle cx="66" cy="82" r="6" fill="#FFBD2E"/>
    <circle cx="88" cy="82" r="6" fill="#27C93F"/>

    <text x="116" y="88" fill="#8ca1c2" font-size="14" font-family="monospace">/dev/observer</text>
    <text x="910" y="88" fill="#637998" font-size="12" font-family="monospace" text-anchor="end">ELF / PTR / HEX / IO</text>

    <g clip-path="url(#panelClip)">
      <g opacity="0.05">
        <rect x="12" y="120" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="138" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="156" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="174" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="192" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="210" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="228" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="246" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="264" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="282" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="300" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="318" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="336" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="354" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="372" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="390" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="408" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="426" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="444" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="462" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="480" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="498" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="516" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="534" width="936" height="1" fill="#87A4D4"/>
        <rect x="12" y="552" width="936" height="1" fill="#87A4D4"/>
      </g>

      <text x="48" y="150" fill="#7AA2F7" font-size="18" font-family="monospace">$ inspect --mode=deep</text>

      <text x="48" y="192" fill="#9ECE6A" font-size="15" font-family="monospace">[mem ] arena ready @ 0x0040A1F0</text>
      <text x="48" y="220" fill="#9ECE6A" font-size="15" font-family="monospace">[ptr ] head -&gt; next != 0x0</text>
      <text x="48" y="248" fill="#9ECE6A" font-size="15" font-family="monospace">[sys ] probing /proc /sys /dev</text>
      <text x="48" y="276" fill="#9ECE6A" font-size="15" font-family="monospace">[elf ] header integrity confirmed</text>
      <text x="48" y="304" fill="#FFB86C" font-size="15" font-family="monospace">[io  ] fd table synchronized</text>
      <text x="48" y="332" fill="#C0CAF5" font-size="15" font-family="monospace">[map ] segments aligned to page size</text>

      <text x="48" y="376" fill="#C0CAF5" font-size="15" font-family="monospace">&gt; awaiting input</text>
      <rect x="200" y="362" width="10" height="18" fill="#7AA2F7">
        <animate attributeName="opacity" values="1;0;1" dur="1.05s" repeatCount="indefinite"/>
      </rect>

      <line x1="48" y1="406" x2="500" y2="406" stroke="#2b3745"/>

      <text x="48" y="438" fill="#667B9B" font-size="13" font-family="monospace">01</text>
      <text x="80" y="438" fill="#C0CAF5" font-size="13" font-family="monospace">typedef struct node {</text>

      <text x="48" y="462" fill="#667B9B" font-size="13" font-family="monospace">02</text>
      <text x="80" y="462" fill="#C0CAF5" font-size="13" font-family="monospace">    void *data;</text>

      <text x="48" y="486" fill="#667B9B" font-size="13" font-family="monospace">03</text>
      <text x="80" y="486" fill="#C0CAF5" font-size="13" font-family="monospace">    struct node *next;</text>

      <text x="48" y="510" fill="#667B9B" font-size="13" font-family="monospace">04</text>
      <text x="80" y="510" fill="#C0CAF5" font-size="13" font-family="monospace">} node_t;</text>

      <text x="48" y="534" fill="#667B9B" font-size="13" font-family="monospace">05</text>
      <text x="80" y="534" fill="#7DCFFF" font-size="13" font-family="monospace">void *page_alloc(size_t size);</text>

      <rect x="620" y="142" width="268" height="150" rx="18" fill="none" stroke="#2b3745"/>
      <text x="642" y="170" fill="#E4ECF9" font-size="16" font-family="monospace">segment map</text>
      <text x="642" y="198" fill="#667B9B" font-size="13" font-family="monospace">text</text>
      <rect x="698" y="186" width="144" height="10" rx="5" fill="none" stroke="#2b3745"/>
      <rect x="698" y="186" width="96" height="10" rx="5" fill="#7AA2F7">
        <animate attributeName="width" values="72;112;96;120;96" dur="5s" repeatCount="indefinite"/>
      </rect>

      <text x="642" y="224" fill="#667B9B" font-size="13" font-family="monospace">data</text>
      <rect x="698" y="212" width="144" height="10" rx="5" fill="none" stroke="#2b3745"/>
      <rect x="698" y="212" width="78" height="10" rx="5" fill="#12D6A0">
        <animate attributeName="width" values="54;92;78;110;78" dur="4.5s" repeatCount="indefinite"/>
      </rect>

      <text x="642" y="250" fill="#667B9B" font-size="13" font-family="monospace">heap</text>
      <rect x="698" y="238" width="144" height="10" rx="5" fill="none" stroke="#2b3745"/>
      <rect x="698" y="238" width="62" height="10" rx="5" fill="#FFB86C">
        <animate attributeName="width" values="48;72;62;86;62" dur="3.8s" repeatCount="indefinite"/>
      </rect>

      <rect x="620" y="320" width="268" height="178" rx="18" fill="none" stroke="#2b3745"/>
      <text x="642" y="348" fill="#E4ECF9" font-size="16" font-family="monospace">core graph</text>

      <rect x="720" y="372" width="68" height="30" rx="12" fill="none" stroke="#2A4B79"/>
      <text x="754" y="392" fill="#C0CAF5" font-size="13" font-family="monospace" text-anchor="middle">core</text>

      <rect x="648" y="436" width="74" height="28" rx="12" fill="none" stroke="#223C60"/>
      <text x="685" y="454" fill="#B8C7E0" font-size="12" font-family="monospace" text-anchor="middle">memory</text>

      <rect x="784" y="436" width="74" height="28" rx="12" fill="none" stroke="#223C60"/>
      <text x="821" y="454" fill="#B8C7E0" font-size="12" font-family="monospace" text-anchor="middle">io</text>

      <rect x="720" y="462" width="68" height="28" rx="12" fill="none" stroke="#223C60"/>
      <text x="754" y="480" fill="#B8C7E0" font-size="12" font-family="monospace" text-anchor="middle">shell</text>

      <line x1="754" y1="402" x2="685" y2="436" stroke="url(#lineFade)" stroke-width="2"/>
      <line x1="754" y1="402" x2="821" y2="436" stroke="url(#lineFade)" stroke-width="2"/>
      <line x1="754" y1="402" x2="754" y2="462" stroke="url(#lineFade)" stroke-width="2"/>

      <circle cx="754" cy="402" r="3.5" fill="#7AA2F7">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="685" cy="436" r="3.5" fill="#12D6A0">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="821" cy="436" r="3.5" fill="#12D6A0">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="754" cy="462" r="3.5" fill="#FFB86C">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/>
      </circle>

      <text x="642" y="538" fill="#667B9B" font-size="12" font-family="monospace">0x0000</text>
      <text x="704" y="538" fill="#12D6A0" font-size="12" font-family="monospace">7F 45 4C 46 02 01 01 00</text>

      <text x="642" y="558" fill="#667B9B" font-size="12" font-family="monospace">0x0008</text>
      <text x="704" y="558" fill="#7AA2F7" font-size="12" font-family="monospace">00 00 00 00 00 00 00 00</text>

      <circle cx="0" cy="0" r="4" fill="#7AA2F7" opacity="0.95">
        <animateMotion dur="4.5s" repeatCount="indefinite" path="M754,402 L685,436 L754,402 L821,436 L754,402 L754,462 L754,402"/>
        <animate attributeName="opacity" values="0;1;1;0" dur="4.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <text x="48" y="610" fill="#5F7496" font-size="12" font-family="monospace">0x00 · silent modules · low-level state</text>
    <text x="932" y="610" fill="#5F7496" font-size="12" font-family="monospace" text-anchor="end">/proc /sys /dev</text>
  </g>
</svg>
